<!doctype html><html><head><meta charset="utf-8"><title>palette compare</title>
<style>
body{margin:0;font:12px -apple-system,system-ui,sans-serif;background:#fff;color:#191f28}
body.dark{background:#17171c;color:#f2f4f7}
.row{display:flex;align-items:center;gap:12px;padding:8px 12px;border-bottom:1px solid #8884}
.name{width:88px;font-weight:600}
.sw{display:flex}.sw i{width:20px;height:20px;display:block}
canvas{display:block}
.hd{display:flex;gap:12px;padding:6px 12px;font-weight:700;color:#8b95a1}
.hd span:nth-child(1){width:88px}.hd span{width:150px}
</style></head><body>
<div class="hd"><span>palette</span><span style="width:120px">swatches</span><span>normal</span><span>deuteranopia</span><span>protanopia</span><span>2D net</span></div>
<div id="wrap"></div>
<script src="js/draw_nnn.js"></script>
<script src="js/vcube3d.js"></script>
<script>
var SCR = "R U R' U' F2 L D' B2 R2 F' U2 L' B U R2 D2 F";
var CANDS = {
  'toy(current)': ['#ffffff','#ee0000','#00d800','#ffff00','#ff8000','#0000f2'],
  'P1 brief':     ['#f2f4f7','#bd2540','#31ba6c','#f5d312','#f5791d','#2b7fd4'],
  'P4 hand':      ['#f4f6fa','#b41f3c','#22a86f','#f6d616','#f2801a','#2b7cc4'],
  'Q2 teal':      ['#f4f6fa','#ad1338','#17ad86','#f6d616','#f2801a','#2b7cc4'],
  'Q5 tuned':     ['#f4f6fa','#ad1338','#1eb98d','#f8de10','#ee7a10','#2b7cc4'],
  'B optimizer':  ['#eff2fe','#ab013e','#1eb688','#f2e70b','#e67904','#2d7cbd']
};
// Brettel/Vienot CVD simulation applied to rendered pixels
function srgb2lin(c){c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
function lin2srgb(c){c=Math.max(0,Math.min(1,c));return (c<=0.0031308?c*12.92:1.055*Math.pow(c,1/2.4)-0.055)*255;}
function cvd(canvas,kind){
  var ctx=canvas.getContext('2d'), d=ctx.getImageData(0,0,canvas.width,canvas.height), p=d.data;
  for(var i=0;i<p.length;i+=4){
    var r=srgb2lin(p[i]),g=srgb2lin(p[i+1]),b=srgb2lin(p[i+2]);
    var L=17.8824*r+43.5161*g+4.11935*b, M=3.45565*r+27.1554*g+3.86714*b, S=0.0299566*r+0.184309*g+1.46709*b;
    if(kind==='deutan') M=0.494207*L+1.24827*S; else L=2.02344*M-2.52581*S;
    var r2=0.080944*L-0.130504*M+0.116721*S, g2=-0.0102485*L+0.0540194*M-0.113615*S, b2=-0.000365294*L-0.00412163*M+0.693513*S;
    p[i]=lin2srgb(Math.max(0,r2));p[i+1]=lin2srgb(Math.max(0,g2));p[i+2]=lin2srgb(Math.max(0,b2));
  }
  ctx.putImageData(d,0,0);
}
var wrap=document.getElementById('wrap');
Object.keys(CANDS).forEach(function(name){
  var pal=CANDS[name], row=document.createElement('div'); row.className='row';
  var nm=document.createElement('div'); nm.className='name'; nm.textContent=name; row.appendChild(nm);
  var sw=document.createElement('div'); sw.className='sw'; sw.style.width='120px';
  pal.forEach(function(c){var i=document.createElement('i'); i.style.background=c; sw.appendChild(i);});
  row.appendChild(sw);
  ['normal','deutan','protan'].forEach(function(mode){
    var c=document.createElement('canvas'); c.width=150;c.height=150; row.appendChild(c);
    var e=VCube3D.create(c,{size:3,palette:pal,zoom:0.95});
    e.setState(ScrImage.nnn.apply(ScrImage.nnn.solved(3),3,SCR)); e.render();
    if(mode!=='normal') cvd(c,mode);
  });
  var c2=document.createElement('canvas'); c2.width=180;c2.height=140; row.appendChild(c2);
  ScrImage.nnn.draw(c2,SCR,3,pal);
  wrap.appendChild(row);
});
</script></body></html>
